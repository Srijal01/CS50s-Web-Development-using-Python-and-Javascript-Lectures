<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animate</title>
    <style>
        /*@keyframes grow {
            from {
                font-size: 20px;
                color: black;
            }
            to {
                font-size: 100px;
                color: red;
            }
        }*/
        /* @keyframes move {
            from {
                left: 0%;
            }
            to {
                left: 80%;
            }
        }*/
         @keyframes move {
            0% {
                left: 0%;
            }
            50% {
                left: 50%;
            }
            100% {
                left: 0%;
            }
        }
        h1 {
            position: relative;
            /*animation-name: grow;*/
            animation-name: move;
            animation-duration: 2s;
            animation-fill-mode: forwards;
            animation-iteration-count: infinite;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const h1 = document.querySelector('h1');
            h1.style.animationPlayState = 'paused'; // Start with animation paused

            document.querySelector('button').onclick = () => {
                if (h1.style.animationPlayState === 'paused') {
                    h1.style.animationPlayState = 'running'; // Start animation on button click
                } else {
                    h1.style.animationPlayState = 'paused'; // Pause animation on button click
                }
            }
        });
    </script>
</head>
<body>
    <button>Click Here!</button>
    <h1>Welcome!</h1>
</body>
</html>
